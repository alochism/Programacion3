<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>
    <link rel="stylesheet" href="../../../styles.css">
</head>

<body>

    <main>
        <h1>Iniciar sesión</h1>

        <!-- Formulario de login, el id lo uso para capturarlo desde login.ts -->
        <form id="form-login">

            <!-- Se pide validar email y password contra localStorage -->
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="ejemplo@email.com" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="Tu contraseña" required>

            <button type="submit">Iniciar sesión</button>

        </form>

        <!-- Enlace para ir al registro si no se tiene cuenta  -->
        <a href="../registro/index.html">¿No tenés cuenta? Registrate</a>

    </main>

    <!-- Conecto el archivo TypeScript que maneja la lógica del login -->
    <script type="module" src="./login.ts"></script>

</body>

</html>
