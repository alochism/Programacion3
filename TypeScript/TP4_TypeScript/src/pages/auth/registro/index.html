<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Registro</title>
    <link rel="stylesheet" href="../../../styles.css">
</head>

<body>

    <main>
        <h1>Crear cuenta</h1>

        <!-- Formulario de registro, el id lo uso para capturarlo desde registro.ts -->
        <form id="form-registro">

            <!-- Se pide email y password, sin selector de rol -->
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="ejemplo@email.com" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="Tu contraseña" required>

            <button type="submit">Registrarse</button>

        </form>

        <!-- Enlace para ir al login si ya se tiene cuenta  -->
        <a href="../login/index.html">¿Ya tenés cuenta? Iniciá sesión</a>

    </main>

    <!-- Conecto el archivo TypeScript que maneja la lógica del formulario -->
    <script type="module" src="./registro.ts"></script>

</body>

</html>
